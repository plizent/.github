name: Feature Request
description: Suggest an idea or improvement.
title: "[Feature]: "
labels:
  - enhancement
type: feature

body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to suggest an improvement.

        Please describe the problem you are trying to solve before proposing a solution.

  - type: checkboxes
    id: checklist
    attributes:
      label: Before You Begin
      description: Please confirm the following.
      options:
        - label: I searched existing issues and discussions.
          required: true
        - label: This is not a bug report.
          required: true
        - label: I agree to follow this project's Code of Conduct.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve?
      placeholder: Describe the problem or limitation.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe your proposed solution.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternatives you have considered.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Information
      description: Add mockups, examples, references, or any other useful information.
    validations:
      required: false