# Automatically generated release notes configuration.
#
# Documentation:
# https://docs.github.com/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  exclude:
    labels:
      - duplicate
      - invalid
      - question
      - wontfix
      - skip-changelog

    authors:
      - dependabot
      - dependabot[bot]

  categories:
    - title: 🚀 Features
      labels:
        - feature
        - enhancement

    - title: 🐞 Bug Fixes
      labels:
        - bug
        - fix

    - title: 📚 Documentation
      labels:
        - documentation
        - docs

    - title: ⚡ Performance
      labels:
        - performance

    - title: 🔒 Security
      labels:
        - security

    - title: 🧪 Tests
      labels:
        - test
        - tests

    - title: 🏗 Maintenance
      labels:
        - chore
        - maintenance
        - dependencies
        - ci
        - build

    - title: Other Changes
      labels: []